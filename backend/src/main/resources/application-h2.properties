# Chạy backend với H2 (không cần MySQL): thêm spring.profiles.active=h2 vào application.properties
# hoặc: java -jar app.jar --spring.profiles.active=h2
spring.datasource.url=jdbc:h2:file:./data/motel-h2;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
