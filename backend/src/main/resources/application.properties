server.port=8080

# Upload khach thue (anh chan dung / CCCD) — mac dinh Spring rat nho
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

spring.datasource.url=jdbc:mysql://localhost:3306/motel?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=12345678
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=change_this_secret_key_to_64_chars_minimum_0123456789abcdef
