app.payos.client-id=
app.payos.api-key=
app.payos.checksum-key=
app.payos.webhook-url=${APP_URL:http://localhost:8080}/api/thanh-toan/payos/webhook
app.payos.return-url=http://localhost:4002/my-invoices?payment=success
