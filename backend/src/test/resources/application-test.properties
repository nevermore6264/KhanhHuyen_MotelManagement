# H2 in-memory (kiểu tương thích MySQL) — dùng với @ActiveProfiles("test")
spring.datasource.url=jdbc:h2:mem:moteltest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.task.scheduling.enabled=false

app.jwt.secret=test_jwt_secret_minimum_64_chars________________________________0123456789abcdef
app.jwt.expirationMs=86400000

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
app.mail.from=test@local

app.sms.enabled=false

app.upload.dir=${java.io.tmpdir}/motel-test-upload

app.payos.client-id=test
app.payos.api-key=test
app.payos.checksum-key=test
app.payos.webhook-url=http://localhost:8080/api/thanh-toan/payos/webhook
app.payos.auto-confirm-webhook=false
app.payos.return-url=http://localhost:4002/
app.payos.cancel-url=http://localhost:4002/

spring.main.banner-mode=off

# WebMvcTest / @SpringBootTest: starter oauth2-resource-server trên classpath nhưng API dùng JWT tùy chỉnh (không issuer-uri).
# Tránh OAuth2ResourceServerAutoConfiguration gây lỗi tạo context (ví dụ KhachThueControllerTest).
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
